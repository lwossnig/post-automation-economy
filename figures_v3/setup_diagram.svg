<svg viewBox="0 0 960 664" width="960" height="664" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">
<rect x="0" y="0" width="960" height="664" fill="white"/>
        <defs>
          <marker id="ak" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#4a423b"/></marker>
          <marker id="at" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1d4e44"/></marker>
          <marker id="as" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7c2d12"/></marker>
        </defs>
        <!-- UK BOUNDARY (everything inside is located in the UK and taxable at source) -->
        <rect x="22" y="58" width="600" height="566" rx="14" fill="#f3efe6" stroke="#1d4e44" stroke-width="1.4" stroke-dasharray="7 5"/>
        <text x="34" y="50" fill="#1d4e44" font-size="12.5" font-weight="bold">UNITED KINGDOM</text>
        <text x="176" y="50" fill="#1d4e44" font-size="10.5">&#8212; production, the workforce, the robots and home-located servers are here (taxable at source)</text>
        <!-- GOVERNMENT -->
        <rect x="186" y="74" width="248" height="54" rx="6" fill="#eef3f1" stroke="#1d4e44"/>
        <text x="310" y="96" text-anchor="middle" fill="#1d4e44" font-size="13" font-weight="bold">GOVERNMENT</text>
        <text x="310" y="113" text-anchor="middle" fill="#4a423b">the UK state: taxes, UBI, fund</text>
        <!-- FIRM -->
        <rect x="148" y="188" width="452" height="256" rx="8" fill="#fbf8f1" stroke="#4a423b"/>
        <text x="374" y="212" text-anchor="middle" fill="#1a1714" font-size="13" font-weight="bold">THE AUTOMATED FIRM (produces in the UK)</text>
        <rect x="166" y="228" width="200" height="200" rx="6" fill="#f6f1e7" stroke="#8a8078"/>
        <text x="266" y="250" text-anchor="middle" fill="#1a1714" font-weight="bold">Routine cluster</text>
        <text x="266" y="272" text-anchor="middle" fill="#4a423b">routine labour</text>
        <text x="266" y="290" text-anchor="middle" fill="#4a423b">+ robotic capital K_r</text>
        <text x="266" y="316" text-anchor="middle" fill="#1d4e44" font-size="10.5">LOCAL: robots are physical,</text>
        <text x="266" y="330" text-anchor="middle" fill="#1d4e44" font-size="10.5">they sit and work in the UK</text>
        <text x="266" y="352" text-anchor="middle" fill="#8a8078" font-size="10.5">competitive, low rent</text>
        <text x="266" y="396" text-anchor="middle" fill="#7c2d12" font-size="10.5">made by e.g. Tesla</text>
        <text x="266" y="410" text-anchor="middle" fill="#7c2d12" font-size="10.5">(Optimus), 1X (NEO)</text>
        <rect x="382" y="228" width="200" height="200" rx="6" fill="#f6f1e7" stroke="#8a8078"/>
        <text x="482" y="250" text-anchor="middle" fill="#1a1714" font-weight="bold">Cognitive cluster</text>
        <text x="482" y="272" text-anchor="middle" fill="#4a423b">cognitive labour</text>
        <text x="482" y="290" text-anchor="middle" fill="#4a423b">+ AI compute K_ai</text>
        <text x="482" y="316" text-anchor="middle" fill="#1d4e44" font-size="10.5">PART-LOCAL: a share s_home</text>
        <text x="482" y="330" text-anchor="middle" fill="#1d4e44" font-size="10.5">of servers in the UK, rest abroad</text>
        <text x="482" y="352" text-anchor="middle" fill="#7c2d12" font-size="10.5">FOREIGN: the model &amp; IP,</text>
        <text x="482" y="366" text-anchor="middle" fill="#7c2d12" font-size="10.5">which earns the rent</text>
        <text x="482" y="396" text-anchor="middle" fill="#7c2d12" font-size="10.5">run by e.g. OpenAI,</text>
        <text x="482" y="410" text-anchor="middle" fill="#7c2d12" font-size="10.5">Anthropic</text>
        <!-- HOUSEHOLDS -->
        <rect x="44" y="498" width="276" height="118" rx="6" fill="#fbf8f1" stroke="#4a423b"/>
        <text x="182" y="521" text-anchor="middle" fill="#1a1714" font-size="13" font-weight="bold">UK HOUSEHOLDS</text>
        <text x="182" y="543" text-anchor="middle" fill="#4a423b">routine + cognitive workers (wages)</text>
        <text x="182" y="562" text-anchor="middle" fill="#4a423b">domestic owners (dividends)</text>
        <text x="182" y="588" text-anchor="middle" fill="#8a8078" font-size="10.5">consume, save, pay income/wealth tax</text>
        <!-- REST OF WORLD (outside the UK boundary) -->
        <rect x="690" y="206" width="252" height="250" rx="6" fill="#f3eee4" stroke="#7c2d12" stroke-width="1.4"/>
        <text x="816" y="230" text-anchor="middle" fill="#7c2d12" font-size="13" font-weight="bold">REST OF WORLD</text>
        <text x="816" y="248" text-anchor="middle" fill="#7c2d12" font-size="11">the US or China (foreign)</text>
        <text x="816" y="276" text-anchor="middle" fill="#4a423b">owns the AI model &amp; IP</text>
        <text x="816" y="294" text-anchor="middle" fill="#4a423b">&#8594; collects the rent</text>
        <text x="816" y="320" text-anchor="middle" fill="#4a423b">makes the robots &amp; chips</text>
        <text x="816" y="344" text-anchor="middle" fill="#4a423b">owns foreign equity</text>
        <text x="816" y="370" text-anchor="middle" fill="#4a423b">may host offshore servers</text>
        <text x="816" y="402" text-anchor="middle" fill="#8a8078" font-size="10.5">supplies capital,</text>
        <text x="816" y="416" text-anchor="middle" fill="#8a8078" font-size="10.5">repatriates returns</text>

        <!-- ============ FLOWS (arrows) and their labels ============ -->

        <!-- households <-> firm: two parallel vertical arrows in the gap -->
        <line x1="208" y1="497" x2="208" y2="446" stroke="#4a423b" marker-end="url(#ak)"/>
        <text x="200" y="476" text-anchor="end" fill="#4a423b" font-size="10.5">labour &#8593;</text>
        <line x1="256" y1="446" x2="256" y2="497" stroke="#4a423b" marker-end="url(#ak)"/>
        <text x="266" y="476" fill="#4a423b" font-size="10.5">&#8595; wages + dividends</text>

        <!-- firm -> government: corporate & income tax -->
        <line x1="360" y1="186" x2="360" y2="132" stroke="#1d4e44" marker-end="url(#at)"/>
        <text x="352" y="183" text-anchor="end" fill="#1d4e44" font-size="10.5">corporate &amp; income tax</text>

        <!-- government -> households: UBI + rebates (curve down the left, label kept clear of the line) -->
        <path d="M192,124 C70,170 56,360 110,498" fill="none" stroke="#1d4e44" marker-end="url(#at)"/>
        <text x="94" y="300" fill="#1d4e44" font-size="10.5">UBI +</text>
        <text x="94" y="316" fill="#1d4e44" font-size="10.5">rebates</text>

        <!-- cross-border OUT: AI rent leaving (firm -> RoW), with the withholding lever above it -->
        <rect x="602" y="232" width="86" height="20" rx="10" fill="#7c2d12"/><text x="645" y="246" text-anchor="middle" fill="#fbf8f1" font-size="10">withholding</text>
        <text x="657" y="273" text-anchor="middle" fill="#7c2d12" font-size="8.5">AI rent</text>
        <text x="657" y="285" text-anchor="middle" fill="#7c2d12" font-size="8.5">(licence fee)</text>
        <line x1="600" y1="300" x2="686" y2="300" stroke="#7c2d12" marker-end="url(#as)"/>

        <!-- cross-border IN: inputs & equity coming in (RoW -> firm); label sits inside the UK box -->
        <line x1="688" y1="392" x2="602" y2="392" stroke="#4a423b" marker-end="url(#ak)"/>
        <text x="598" y="466" text-anchor="end" fill="#4a423b" font-size="10">&#8592; robots, AI compute &amp; equity (FDI)</text>

        <!-- TAX LEVERS (sienna) -->
        <rect x="150" y="150" width="74" height="20" rx="10" fill="#7c2d12"/><text x="187" y="164" text-anchor="middle" fill="#fbf8f1" font-size="10.5">robot tax</text>
        <rect x="440" y="150" width="48" height="20" rx="10" fill="#7c2d12"/><text x="464" y="164" text-anchor="middle" fill="#fbf8f1" font-size="10.5">DST</text>
        <rect x="404" y="486" width="206" height="20" rx="10" fill="#7c2d12"/><text x="507" y="500" text-anchor="middle" fill="#fbf8f1" font-size="10">s_home: where the AI servers sit</text>

        <!-- legend -->
        <text x="30" y="640" fill="#8a8078" font-size="10.5">inside the dashed box = located in the UK (taxable at source); outside = foreign-owned or foreign-located.</text><text x="30" y="656" fill="#8a8078" font-size="10.5">teal = fiscal, sienna = cross-border &amp; the four levers.</text>
      </svg>
